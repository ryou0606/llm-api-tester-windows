# LLM API Tester - Docker Compose
# 一键启动后端 API 服务

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-api-tester
    ports:
      - "13220:8000"
    volumes:
      # 持久化 SQLite 数据
      - ./data:/app/data
    environment:
      - LLM_TESTER_DEBUG=false
      - LLM_TESTER_HOST=0.0.0.0
      - LLM_TESTER_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
